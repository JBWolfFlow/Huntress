# Huntress Attack Machine — Tinyproxy Configuration
# Enforces scope: only domains in HUNTRESS_ALLOWED_DOMAINS can be reached.
# The entrypoint.sh generates upstream/filter rules at container start.

Port 3128
Listen 127.0.0.1

# Only allow connections from inside the container
Allow 127.0.0.1

# Use a domain filter file (generated by entrypoint.sh)
# FilterType 0 = domain-based filtering
# FilterDefaultDeny Yes = block everything not in the list (default-deny)
Filter "/etc/tinyproxy/filter"
FilterURLs Off
FilterDefaultDeny Yes
FilterCaseSensitive Off

# Stealth — don't reveal proxy headers
DisableViaHeader Yes
XTinyproxy No

# Minimal logging
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Error

# PID file
PidFile "/tmp/tinyproxy.pid"

# Run as hunter user
User hunter
Group hunter

# Timeouts
Timeout 60
ConnectPort 443
ConnectPort 8443
