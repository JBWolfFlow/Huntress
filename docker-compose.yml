version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: huntress-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  juice-shop:
    image: bkimminich/juice-shop
    container_name: huntress-juice-shop
    ports:
      - "3001:3000"
    profiles:
      - testing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  attack-machine:
    build:
      context: ./docker
      dockerfile: Dockerfile.attack-machine
    image: huntress-attack-machine:latest
    container_name: huntress-attack-machine
    profiles:
      - attack
    environment:
      - HUNTRESS_ALLOWED_DOMAINS=${HUNTRESS_ALLOWED_DOMAINS:-localhost}
    read_only: true
    tmpfs:
      - /tmp:size=512m,noexec,nosuid
      - /home/hunter:size=256m,noexec,nosuid
      - /var/log/tinyproxy:size=16m,noexec,nosuid
      - /etc/tinyproxy:size=1m,noexec,nosuid
      - /var/run:size=8m,noexec,nosuid
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW

volumes:
  qdrant_storage:
    driver: local